<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400"
     font-family="'Inter','Segoe UI','Roboto','DejaVu Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101c38"/>
      <stop offset="0.55" stop-color="#0b1426"/>
      <stop offset="1" stop-color="#060b16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#3584e4" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#3584e4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a90ec"/>
      <stop offset="1" stop-color="#2c6bcf"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cadfff"/>
    </linearGradient>
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#3584e4" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow)"/>

  <!-- clip-history card motif (right) -->
  <g>
    <g transform="translate(905,52) rotate(7)" opacity="0.85">
      <rect width="330" height="76" rx="16" fill="#16243f" stroke="#ffffff" stroke-opacity="0.06"/>
      <rect x="24" y="26" width="200" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.13"/>
      <rect x="24" y="44" width="138" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.07"/>
    </g>
    <g transform="translate(884,150) rotate(3)" opacity="0.95">
      <rect width="330" height="76" rx="16" fill="#1a2a49" stroke="#ffffff" stroke-opacity="0.07"/>
      <rect x="24" y="22" width="18" height="18" rx="5" fill="#3584e4" fill-opacity="0.85"/>
      <rect x="56" y="26" width="178" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.16"/>
      <rect x="56" y="44" width="120" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.09"/>
    </g>
    <g transform="translate(918,250) rotate(10)" opacity="0.9">
      <rect width="330" height="76" rx="16" fill="#16243f" stroke="#ffffff" stroke-opacity="0.06"/>
      <rect x="24" y="26" width="170" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.12"/>
      <rect x="24" y="44" width="96" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.07"/>
    </g>
  </g>

  <!-- logo: brand-blue rounded square + paperclip -->
  <g transform="translate(96,116)" filter="url(#logoShadow)">
    <rect width="168" height="168" rx="40" fill="url(#logo)"/>
    <g transform="translate(33,28) scale(4.4)" fill="#ffffff">
      <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5
               s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5
               c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5
               v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="300" y="206" font-size="98" font-weight="800" letter-spacing="-3" fill="url(#word)">CopyClip</text>
  <text x="307" y="276" font-size="31" font-weight="500" fill="#9fb0cc">Clipboard history for Linux</text>

  <!-- capability pill -->
  <g transform="translate(307,302)">
    <rect width="348" height="46" rx="23" fill="#3584e4" fill-opacity="0.15" stroke="#3584e4" stroke-opacity="0.5"/>
    <text x="24" y="30" font-size="21" font-weight="600" fill="#bdd4ff">One hotkey  ·  X11 &amp; Wayland</text>
  </g>
</svg>
