name: Feature request
description: Suggest an idea or improvement for CopyClip
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Describe the use case, not only the solution — it makes
        it much easier to find the right fit.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and didn't find this already requested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Mockups, examples, links — whatever helps.
