name: CI

# Runs on every push to ANY branch (so feature branches are always green) and on
# pull requests into main — no surprises when a branch is finally merged.
on:
  push:
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. rapid pushes to a feature branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build, lint, test (ASan)
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      # Pin clang-format/clang-tidy for parity with local (18.1.8).
      CLANG_TOOLS_VERSION: 18.1.8
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Install pinned clang-format and clang-tidy
        run: |
          python3 -m pip install --user \
            "clang-format==${CLANG_TOOLS_VERSION}" \
            "clang-tidy==${CLANG_TOOLS_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure and build (asan preset)
        run: |
          cmake --preset asan
          cmake --build --preset asan

      - name: clang-format check
        run: |
          mapfile -t files < <(git ls-files 'src/**/*.cpp' 'src/**/*.hpp' \
            'tests/**/*.cpp' 'tests/**/*.hpp')
          if [ ${#files[@]} -gt 0 ]; then
            clang-format --dry-run -Werror "${files[@]}"
          fi

      - name: clang-tidy check
        run: |
          mapfile -t files < <(git ls-files 'src/**/*.cpp')
          if [ ${#files[@]} -gt 0 ]; then
            clang-tidy -p build/asan "${files[@]}"
          fi

      - name: Test (ctest, asan preset)
        run: ctest --preset asan --output-on-failure --no-tests=ignore

  memcheck:
    name: Valgrind memcheck (Qt/X11-free tests)
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          valgrind: "true"

      # Valgrind needs a non-sanitized build (it conflicts with ASan), so use the
      # debug preset here.
      - name: Configure and build (debug preset)
        run: |
          cmake --preset debug
          cmake --build --preset debug

      - name: Valgrind memcheck
        run: ./scripts/memcheck.sh build/debug

  integration:
    name: Integration (release build + headless smoke)
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Configure and build (release preset)
        run: |
          cmake --preset release
          cmake --build --preset release

      - name: Test (ctest, release preset)
        run: ctest --preset release --output-on-failure --no-tests=ignore

      - name: Headless smoke (single-instance + show IPC)
        run: ./scripts/smoke.sh build/release/src/app/copyclip
