# Pre-commit hooks: format and hygiene gate run before each commit, matching the
# project's CI. Install once with `pre-commit install` (after `pip install
# pre-commit` or `uv tool install pre-commit`). clang-tidy is intentionally left
# to CI and the editor hooks — it needs the compile database and is too slow for
# a commit hook.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    # Pinned to the clang-format the project formats against locally and in CI.
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
