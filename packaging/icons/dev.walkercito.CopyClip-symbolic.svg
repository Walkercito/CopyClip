<?xml version="1.0" encoding="UTF-8"?>
<!-- Symbolic panel/tray icon: the clip alone, monochrome on a transparent
     background, so the shell recolours it to match the panel. Tilted ~40°, and
     stroked to thicken the wire so it stays legible (not a few specks) once the
     shell renders it at ~16px. The 24x24 viewBox leaves room for the tilt. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
  <g transform="rotate(40 12 12)" fill="#2e3436" stroke="#2e3436" stroke-width="1.6"
     stroke-linejoin="round" stroke-linecap="round">
    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5
             s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5
             c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5
             v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
  </g>
</svg>
